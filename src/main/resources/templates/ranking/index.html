<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>수익률 랭킹 - MockInvest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f6fa; color: #1a1a2e; }
    .card { background: #ffffff; border: 1px solid #e2e5eb; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .table { color: #1a1a2e; }
    .table-hover tbody tr:hover { background-color: #f0f4ff; }
    thead th { color: #495057; font-weight: 500; }
    .up   { color: #16a34a; }
    .down { color: #dc3545; }
    a { color: #f0b90b; text-decoration: none; }
    .my-row { background: rgba(240,185,11,.08) !important; }
    .my-row td { border-top: 1px solid rgba(240,185,11,.3) !important;
                 border-bottom: 1px solid rgba(240,185,11,.3) !important; }
    .rank-medal { font-size: 1.1rem; }
    .my-rank-card {
      background: #ffffff;
      border: 1px solid rgba(240,185,11,.4);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .stat-label { font-size: .75rem; color: #6c757d; }
    .stat-value { font-size: 1.2rem; font-weight: 700; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4 px-3 px-sm-4 pb-5 pb-lg-4" style="max-width: 760px;">

  <div class="d-flex align-items-baseline gap-2 mb-4">
    <h5 class="mb-0">수익률 랭킹</h5>
    <span class="small" style="color:#6c757d;">전체 <span th:text="${totalUsers}"></span>명 참여 · 60초 캐시</span>
  </div>

  <!-- TOP 10 테이블 -->
  <div class="card mb-4">

    <!-- 모바일 -->
    <div class="d-sm-none">
      <div th:each="e : ${top10}"
           th:classappend="${e.username() == #authentication.name} ? 'my-row'"
           class="px-3 py-3 border-bottom"
           style="border-color:#dee2e6!important;">
        <div class="d-flex align-items-center gap-2">
          <!-- 메달 / 순위 -->
          <div style="width:28px; text-align:center; flex-shrink:0;">
            <span th:if="${e.rank() == 1}" class="rank-medal">🥇</span>
            <span th:if="${e.rank() == 2}" class="rank-medal">🥈</span>
            <span th:if="${e.rank() == 3}" class="rank-medal">🥉</span>
            <span th:if="${e.rank() > 3}" class="text-secondary fw-bold"
                  th:text="${e.rank()}"></span>
          </div>
          <div class="flex-grow-1">
            <span class="fw-bold" th:text="${e.username()}"></span>
            <span th:if="${e.username() == #authentication.name}"
                  class="badge ms-1" style="background:#f0b90b; color:#000; font-size:.6rem;">나</span>
          </div>
          <div class="text-end">
            <div class="fw-bold"
                 th:classappend="${e.returnRate() >= 0} ? 'up' : 'down'"
                 th:text="${(e.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(e.returnRate(), 1, 2) + '%'}"></div>
            <div class="small" style="color:#6c757d;"
                 th:text="${#numbers.formatInteger(e.totalAsset(), 1, 'COMMA') + '원'}"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 데스크톱 테이블 -->
    <div class="d-none d-sm-block" style="overflow-x:auto;">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="ps-3" style="width:60px;">순위</th>
            <th>아이디</th>
            <th class="text-end">총 자산</th>
            <th class="text-end pe-3">수익률</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="e : ${top10}"
              th:classappend="${e.username() == #authentication.name} ? 'my-row'">
            <td class="ps-3 text-center">
              <span th:if="${e.rank() == 1}" class="rank-medal">🥇</span>
              <span th:if="${e.rank() == 2}" class="rank-medal">🥈</span>
              <span th:if="${e.rank() == 3}" class="rank-medal">🥉</span>
              <span th:if="${e.rank() > 3}" class="text-secondary fw-bold"
                    th:text="${e.rank()}"></span>
            </td>
            <td>
              <span class="fw-bold" th:text="${e.username()}"></span>
              <span th:if="${e.username() == #authentication.name}"
                    class="badge ms-1" style="background:#f0b90b; color:#000; font-size:.6rem;">나</span>
            </td>
            <td class="text-end" style="color:#aaa;"
                th:text="${#numbers.formatInteger(e.totalAsset(), 1, 'COMMA') + '원'}" style="color:#6c757d;"></td>
            <td class="text-end pe-3 fw-bold"
                th:classappend="${e.returnRate() >= 0} ? 'up' : 'down'"
                th:text="${(e.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(e.returnRate(), 1, 2) + '%'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 내 순위 (Top 10 밖일 때만 별도 표시) -->
  <div th:if="${myEntry != null and myEntry.rank() > 10}" class="my-rank-card p-3 p-sm-4">
    <div class="small mb-2" style="color:#6c757d;">내 순위</div>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <div class="fw-bold" style="font-size:2rem; color:#f0b90b;"
           th:text="${myEntry.rank() + '위'}"></div>
      <div class="text-secondary small">/ <span th:text="${totalUsers}"></span>명 중</div>
      <div class="ms-auto text-end">
        <div class="stat-label">수익률</div>
        <div class="stat-value"
             th:classappend="${myEntry.returnRate() >= 0} ? 'up' : 'down'"
             th:text="${(myEntry.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(myEntry.returnRate(), 1, 2) + '%'}"></div>
      </div>
      <div class="text-end">
        <div class="stat-label">총 자산</div>
        <div class="stat-value text-dark"
             th:text="${#numbers.formatInteger(myEntry.totalAsset(), 1, 'COMMA') + '원'}"></div>
      </div>
    </div>
  </div>

  <!-- 사용자 없음 예외처리 -->
  <div th:if="${myEntry == null}" class="text-center py-4" style="color:#6c757d;">
    순위 정보를 불러올 수 없습니다.
  </div>

</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
