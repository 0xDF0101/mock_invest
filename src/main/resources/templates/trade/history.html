<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>거래내역 - MockInvest</title>
  <script th:replace="~{fragments/navbar :: theme-init}"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background: var(--bg-body); color: var(--c-text); }
    .card { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .table { color: var(--c-text); }
    .table-hover tbody tr:hover { background-color: var(--bg-hover); }
    thead th { color: var(--c-emphasis); font-weight: 500; }
    .badge-buy { background: #16a34a; }
    .badge-sell { background: #dc3545; }
    a { color: #f0b90b; text-decoration: none; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3 px-3 px-sm-4 pb-5 pb-lg-4" style="max-width: 960px;">
  <h5 class="mb-3 text-secondary">거래내역</h5>

  <div class="card">
    <div th:if="${trades.isEmpty()}" class="text-center text-secondary py-5">
      거래 내역이 없습니다.
    </div>

    <!-- 모바일: 카드형 목록 -->
    <div th:if="${!trades.isEmpty()}" class="d-sm-none">
      <div th:each="t : ${trades}" class="px-3 py-3 border-bottom">
        <div class="d-flex justify-content-between align-items-start mb-1">
          <div>
            <span class="badge me-1"
                  th:classappend="${t.type.name() == 'BUY'} ? 'badge-buy' : 'badge-sell'"
                  th:text="${t.type.name() == 'BUY'} ? '매수' : '매도'"></span>
            <a th:href="@{/stocks/{ticker}(ticker=${t.stock.ticker})}"
               class="fw-bold" th:text="${t.stock.name}"></a>
          </div>
          <span class="text-secondary small"
                th:text="${#temporals.format(t.createdAt, 'MM/dd HH:mm')}"></span>
        </div>
        <div class="d-flex justify-content-between small text-secondary mt-1">
          <span>
            <span class="badge bg-secondary me-1" style="font-size:.65rem;" th:text="${t.stock.market}"></span>
            <span th:text="${#numbers.formatInteger(t.price, 1, 'COMMA') + '원 × ' + t.quantity + '주'}"></span>
          </span>
          <div class="text-end">
            <div class="fw-bold" style="color:var(--c-text);"
                 th:text="${#numbers.formatInteger(t.amount, 1, 'COMMA') + '원'}"></div>
            <div class="text-secondary" style="font-size:.7rem;"
                 th:text="'수수료 ' + ${#numbers.formatInteger(t.fee, 1, 'COMMA') + '원'}"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 데스크톱: 테이블 -->
    <div th:if="${!trades.isEmpty()}" class="d-none d-sm-block" style="overflow-x: auto;">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr class="text-secondary small">
            <th class="ps-3">일시</th>
            <th>종목명</th>
            <th>시장</th>
            <th>구분</th>
            <th class="text-end">체결가</th>
            <th class="text-end">수량</th>
            <th class="text-end">거래금액</th>
            <th class="text-end pe-3">수수료+세금</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="t : ${trades}">
            <td class="ps-3 text-secondary small"
                th:text="${#temporals.format(t.createdAt, 'MM/dd HH:mm')}"></td>
            <td>
              <a th:href="@{/stocks/{ticker}(ticker=${t.stock.ticker})}"
                 th:text="${t.stock.name}"></a>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${t.stock.market.name() == 'KOSPI'} ? 'bg-primary' : 'bg-success'"
                    th:text="${t.stock.market}"></span>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${t.type.name() == 'BUY'} ? 'badge-buy' : 'badge-sell'"
                    th:text="${t.type.name() == 'BUY'} ? '매수' : '매도'"></span>
            </td>
            <td class="text-end"
                th:text="${#numbers.formatInteger(t.price, 1, 'COMMA') + '원'}"></td>
            <td class="text-end" th:text="${t.quantity + '주'}"></td>
            <td class="text-end fw-bold"
                th:text="${#numbers.formatInteger(t.amount, 1, 'COMMA') + '원'}"></td>
            <td class="text-end pe-3 text-secondary small"
                th:text="${#numbers.formatInteger(t.fee, 1, 'COMMA') + '원'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <div th:if="${trades.totalPages > 1}" class="d-flex justify-content-center mt-4 gap-2">
    <a th:href="@{/trade/history(page=${trades.number - 1})}"
       th:if="${!trades.first}"
       class="btn btn-outline-secondary btn-sm">이전</a>
    <span class="text-secondary small align-self-center"
          th:text="${trades.number + 1} + ' / ' + ${trades.totalPages} + ' 페이지'"></span>
    <a th:href="@{/trade/history(page=${trades.number + 1})}"
       th:if="${!trades.last}"
       class="btn btn-outline-secondary btn-sm">다음</a>
  </div>
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
