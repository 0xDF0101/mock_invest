<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>거래 통계 - MockInvest</title>
  <script th:replace="~{fragments/navbar :: theme-init}"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background: var(--bg-body); color: var(--c-text); }
    .card { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .stat-val { font-size: 1.8rem; font-weight: 700; line-height: 1.2; }
    .stat-lbl { font-size: .78rem; color: var(--c-secondary); margin-top: .3rem; }
    .stat-sub  { font-size: .75rem; color: var(--c-secondary); margin-top: .25rem; }
    .table { color: var(--c-text); }
    .table-hover tbody tr:hover { background-color: var(--bg-hover); }
    thead th { color: var(--c-secondary); font-weight: 500; font-size: .83rem; }
    a { color: #f0b90b; text-decoration: none; }
    .top-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3 px-3 px-sm-4 pb-5 pb-lg-4" style="max-width: 1100px;">
  <h5 class="mb-3 text-secondary">거래 통계</h5>

  <!-- 거래 없을 때 -->
  <div th:if="${stats.totalTrades() == 0}" class="card p-5 text-center text-secondary">
    아직 거래 내역이 없습니다. 종목을 검색해서 첫 매수를 시작해보세요!
  </div>

  <div th:unless="${stats.totalTrades() == 0}">

    <!-- 요약 카드 4개 -->
    <div class="row g-3 mb-3">
      <div class="col-6 col-md-3">
        <div class="card p-3 text-center">
          <div class="stat-val" th:text="${stats.totalTrades()}">0</div>
          <div class="stat-lbl">총 거래 횟수</div>
          <div class="stat-sub">
            <span class="text-success" th:text="'매수 ' + ${stats.buyCount()}"></span>
            <span class="mx-1" style="color:var(--border)">|</span>
            <span class="text-danger" th:text="'매도 ' + ${stats.sellCount()}"></span>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card p-3 text-center">
          <div class="stat-val"
               th:text="${#numbers.formatDecimal(stats.winRate(), 1, 1) + '%'}"
               th:classappend="${stats.winRate() >= 50} ? 'text-success' : 'text-danger'">0%</div>
          <div class="stat-lbl">승률</div>
          <div class="stat-sub">매도가 > 평균매수가</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card p-3 text-center">
          <div class="stat-val" th:text="${stats.holdingCount()}">0</div>
          <div class="stat-lbl">보유 종목 수</div>
          <div class="stat-sub">수량 > 0 기준</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card p-3 text-center">
          <div th:if="${stats.topStocks().isEmpty()}" class="stat-val text-secondary">-</div>
          <div th:unless="${stats.topStocks().isEmpty()}"
               class="stat-val top-name"
               th:title="${stats.topStocks()[0].name()}"
               th:text="${stats.topStocks()[0].name()}"
               style="font-size:1.2rem;"></div>
          <div class="stat-lbl">최다 거래 종목</div>
          <div class="stat-sub"
               th:unless="${stats.topStocks().isEmpty()}"
               th:text="${stats.topStocks()[0].count() + '회 거래'}"></div>
        </div>
      </div>
    </div>

    <!-- 차트 영역 -->
    <div class="row g-3 mb-3">
      <!-- 월별 거래 횟수 -->
      <div class="col-lg-8">
        <div class="card p-3">
          <div class="fw-bold small mb-3">월별 거래 횟수 (최근 12개월)</div>
          <canvas id="monthlyChart" height="200"></canvas>
        </div>
      </div>
      <!-- 보유 종목 비중 -->
      <div class="col-lg-4">
        <div class="card p-3 h-100 d-flex flex-column">
          <div class="fw-bold small mb-3">현재 보유 비중</div>
          <div th:if="${stats.holdingShares().isEmpty()}"
               class="text-center text-secondary my-auto py-4 small">보유 종목 없음</div>
          <div th:unless="${stats.holdingShares().isEmpty()}"
               class="d-flex justify-content-center align-items-center flex-grow-1">
            <canvas id="holdingChart" style="max-width:220px;max-height:220px;"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Top 5 종목 -->
    <div class="card" th:unless="${stats.topStocks().isEmpty()}">
      <div class="p-3 border-bottom fw-bold small">가장 많이 거래한 종목 Top 5</div>
      <div style="overflow-x:auto;">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th class="ps-3">#</th>
              <th>종목명</th>
              <th>티커</th>
              <th class="text-end pe-3">거래 횟수</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="s, i : ${stats.topStocks()}">
              <td class="ps-3 text-secondary small" th:text="${i.index + 1}"></td>
              <td><a th:href="@{/stocks/{t}(t=${s.ticker()})}" th:text="${s.name()}"></a></td>
              <td class="text-secondary small" th:text="${s.ticker()}"></td>
              <td class="text-end pe-3 fw-bold" th:text="${s.count() + '회'}"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /th:unless -->
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const css       = getComputedStyle(document.documentElement);
  const textColor = css.getPropertyValue('--c-text').trim()      || '#1a1a2e';
  const secColor  = css.getPropertyValue('--c-secondary').trim() || '#6c757d';
  const gridColor = css.getPropertyValue('--border').trim()      || '#e2e5eb';

  // ── 월별 거래 Bar chart ─────────────────────────────────────
  const months   = /*[[${monthlyLabels}]]*/ [];
  const buyData  = /*[[${monthlyBuy}]]*/    [];
  const sellData = /*[[${monthlySell}]]*/   [];

  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: '매수', data: buyData,  backgroundColor: '#16a34a', borderRadius: 3, barPercentage: 0.65 },
        { label: '매도', data: sellData, backgroundColor: '#dc3545', borderRadius: 3, barPercentage: 0.65 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: textColor, font: { size: 12 }, boxWidth: 12 } }
      },
      scales: {
        x: { ticks: { color: secColor, font: { size: 11 } }, grid: { color: gridColor } },
        y: {
          ticks: { color: secColor, stepSize: 1, precision: 0 },
          grid: { color: gridColor },
          beginAtZero: true
        }
      }
    }
  });

  // ── 보유 비중 Doughnut ──────────────────────────────────────
  const holdingLabels = /*[[${holdingNames}]]*/  [];
  const holdingValues = /*[[${holdingValues}]]*/ [];

  if (holdingLabels.length > 0) {
    const palette = ['#f0b90b','#16a34a','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#f97316','#84cc16','#ec4899','#14b8a6'];
    new Chart(document.getElementById('holdingChart'), {
      type: 'doughnut',
      data: {
        labels: holdingLabels,
        datasets: [{
          data: holdingValues,
          backgroundColor: palette.slice(0, holdingLabels.length),
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: textColor, font: { size: 11 }, boxWidth: 12, padding: 8 }
          },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + ctx.label + ': ' + Number(ctx.raw).toLocaleString('ko-KR') + '원'
            }
          }
        }
      }
    });
  }
</script>
</body>
</html>
