<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>미체결 주문 - MockInvest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3e; }
    .text-secondary { color: #9da5ae !important; }
    .table { color: #e0e0e0; }
    .table-hover tbody tr:hover { background-color: #232640; }
    thead th { color: #bbb; font-weight: 500; }
    .badge-buy { background: #26a69a; }
    .badge-sell { background: #ef5350; }
    .badge-pending { background: #f0b90b; color: #000; }
    .badge-filled { background: #26a69a; }
    .badge-cancelled { background: #555; }
    a { color: #f0b90b; text-decoration: none; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3 px-3 px-sm-4 pb-5 pb-lg-4" style="max-width: 960px;">
  <h5 class="mb-3 text-secondary">지정가 주문 내역</h5>

  <div th:if="${successMessage}" class="alert alert-success py-2 small mb-3" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger py-2 small mb-3" th:text="${errorMessage}"></div>

  <div class="card">
    <div th:if="${orders.isEmpty()}" class="text-center text-secondary py-5">주문 내역이 없습니다.</div>

    <!-- 모바일 -->
    <div th:if="${!orders.isEmpty()}" class="d-sm-none">
      <div th:each="o : ${orders}" class="px-3 py-3 border-bottom border-secondary" style="border-color:#2a2d3e!important;">
        <div class="d-flex justify-content-between align-items-start mb-1">
          <div>
            <span class="badge me-1"
                  th:classappend="${o.type.name() == 'BUY'} ? 'badge-buy' : 'badge-sell'"
                  th:text="${o.type.name() == 'BUY'} ? '매수' : '매도'"></span>
            <a th:href="@{/stocks/{t}(t=${o.stock.ticker})}" class="fw-bold" th:text="${o.stock.name}"></a>
          </div>
          <span class="badge"
                th:classappend="${o.status.name() == 'PENDING'} ? 'badge-pending' : (${o.status.name() == 'FILLED'} ? 'badge-filled' : 'badge-cancelled')"
                th:text="${o.status.name() == 'PENDING'} ? '대기' : (${o.status.name() == 'FILLED'} ? '체결' : '취소')"></span>
        </div>
        <div class="d-flex justify-content-between small text-secondary mt-1">
          <span th:text="${#numbers.formatInteger(o.limitPrice, 1, 'COMMA') + '원 × ' + o.quantity + '주'}"></span>
          <span th:text="${#temporals.format(o.createdAt, 'MM/dd HH:mm')}"></span>
        </div>
        <div th:if="${o.status.name() == 'PENDING'}" class="mt-2">
          <form th:action="@{/trade/limit/cancel/{id}(id=${o.id})}" method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm">취소</button>
          </form>
        </div>
      </div>
    </div>

    <!-- 데스크톱 -->
    <div th:if="${!orders.isEmpty()}" class="d-none d-sm-block" style="overflow-x:auto;">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr class="text-secondary small">
            <th class="ps-3">등록일시</th>
            <th>종목명</th>
            <th>구분</th>
            <th class="text-end">지정가</th>
            <th class="text-end">수량</th>
            <th class="text-end">체결일시</th>
            <th class="text-center pe-3">상태</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="o : ${orders}">
            <td class="ps-3 text-secondary small" th:text="${#temporals.format(o.createdAt, 'MM/dd HH:mm')}"></td>
            <td><a th:href="@{/stocks/{t}(t=${o.stock.ticker})}" th:text="${o.stock.name}"></a></td>
            <td>
              <span class="badge"
                    th:classappend="${o.type.name() == 'BUY'} ? 'badge-buy' : 'badge-sell'"
                    th:text="${o.type.name() == 'BUY'} ? '매수' : '매도'"></span>
            </td>
            <td class="text-end" th:text="${#numbers.formatInteger(o.limitPrice, 1, 'COMMA') + '원'}"></td>
            <td class="text-end" th:text="${o.quantity + '주'}"></td>
            <td class="text-end text-secondary small"
                th:text="${o.filledAt != null} ? ${#temporals.format(o.filledAt, 'MM/dd HH:mm')} : '-'"></td>
            <td class="text-center pe-3">
              <span th:if="${o.status.name() != 'PENDING'}" class="badge"
                    th:classappend="${o.status.name() == 'FILLED'} ? 'badge-filled' : 'badge-cancelled'"
                    th:text="${o.status.name() == 'FILLED'} ? '체결' : '취소'"></span>
              <form th:if="${o.status.name() == 'PENDING'}"
                    th:action="@{/trade/limit/cancel/{id}(id=${o.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm py-0">취소</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
