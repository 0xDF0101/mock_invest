<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관심 종목 - MockInvest</title>
  <script th:replace="~{fragments/navbar :: theme-init}"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background: var(--bg-body); color: var(--c-text); }
    .card { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .table { color: var(--c-text); }
    .table-hover tbody tr:hover { background-color: var(--bg-hover); }
    thead th { color: var(--c-secondary); font-weight: 500; font-size: .83rem; }
    .up   { color: #16a34a; }
    .down { color: #dc3545; }
    a { color: #f0b90b; text-decoration: none; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-3 px-3 px-sm-4 pb-5 pb-lg-4" style="max-width: 900px;">
  <h5 class="mb-3 text-secondary">관심 종목</h5>

  <div th:if="${errorMessage}" class="alert alert-danger py-2 small mb-3" th:text="${errorMessage}"></div>

  <div class="card">
    <div th:if="${items.isEmpty()}" class="text-center text-secondary py-5 small">
      관심 종목이 없습니다.<br>
      <a href="/stocks/search" class="mt-2 d-inline-block">종목 검색</a>에서 ☆ 버튼으로 추가해보세요.
    </div>

    <!-- 모바일 -->
    <div th:if="${!items.isEmpty()}" class="d-sm-none">
      <div th:each="item : ${items}" class="px-3 py-3 border-bottom d-flex justify-content-between align-items-center">
        <div>
          <a th:href="@{/stocks/{t}(t=${item.ticker})}" class="fw-bold" th:text="${item.name}"></a>
          <span class="badge ms-1 small"
                th:classappend="${item.market == 'KOSPI'} ? 'bg-primary' : 'bg-success'"
                th:text="${item.market}"></span>
          <div class="small text-secondary mt-1" th:text="${item.ticker}"></div>
        </div>
        <div class="text-end">
          <div class="fw-bold" th:text="${#numbers.formatInteger(item.price, 1, 'COMMA') + '원'}"></div>
          <div class="small"
               th:classappend="${item.change >= 0} ? 'up' : 'down'"
               th:text="${(item.change >= 0 ? '+' : '') + #numbers.formatDecimal(item.changePercent, 1, 2) + '%'}"></div>
          <form th:action="@{/watchlist/toggle}" method="post" class="mt-1">
            <input type="hidden" name="ticker" th:value="${item.ticker}">
            <input type="hidden" name="redirect" value="/watchlist">
            <button type="submit" class="btn btn-outline-secondary btn-sm py-0 px-2">제거</button>
          </form>
        </div>
      </div>
    </div>

    <!-- 데스크톱 -->
    <div th:if="${!items.isEmpty()}" class="d-none d-sm-block" style="overflow-x:auto;">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="ps-3">종목명</th>
            <th>시장</th>
            <th class="text-end">현재가</th>
            <th class="text-end">등락률</th>
            <th class="text-end pe-3"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${items}">
            <td class="ps-3">
              <a th:href="@{/stocks/{t}(t=${item.ticker})}" th:text="${item.name}"></a>
              <span class="text-secondary small ms-1" th:text="${item.ticker}"></span>
            </td>
            <td>
              <span class="badge"
                    th:classappend="${item.market == 'KOSPI'} ? 'bg-primary' : 'bg-success'"
                    th:text="${item.market}"></span>
            </td>
            <td class="text-end fw-bold"
                th:text="${#numbers.formatInteger(item.price, 1, 'COMMA') + '원'}"></td>
            <td class="text-end"
                th:classappend="${item.change >= 0} ? 'up' : 'down'"
                th:text="${(item.change >= 0 ? '+' : '') + #numbers.formatDecimal(item.changePercent, 1, 2) + '%'}"></td>
            <td class="text-end pe-3">
              <form th:action="@{/watchlist/toggle}" method="post" class="d-inline">
                <input type="hidden" name="ticker" th:value="${item.ticker}">
                <input type="hidden" name="redirect" value="/watchlist">
                <button type="submit" class="btn btn-outline-secondary btn-sm py-0">★ 제거</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
