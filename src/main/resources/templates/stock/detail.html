<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${stock.name} + ' - MockInvest'"></title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    body { background: #f5f6fa; color: #1a1a2e; }
    .card { background: #ffffff; border: 1px solid #e2e5eb; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .form-control { background: #ffffff; border-color: #dee2e6; color: #1a1a2e; }
    .form-control:focus { background: #ffffff; color: #1a1a2e; border-color: #f0b90b; box-shadow: 0 0 0 0.2rem rgba(240,185,11,.15); }
    .up { color: #16a34a; } .down { color: #dc3545; }
    .period-btn {
      border: 1px solid #dee2e6; background: #ffffff; color: #495057;
      padding: 4px 14px; border-radius: 4px; cursor: pointer; font-size: .8rem;
    }
    .period-btn.active, .period-btn:hover { background: #f0b90b; color: #000; border-color: #f0b90b; }
    #chart { width: 100%; height: 340px; }
    @media (max-width: 576px) { #chart { height: 240px; } }
    a { color: #f0b90b; text-decoration: none; }
    /* 매수/매도 탭 (모바일) */
    .trade-tab { cursor: pointer; padding: .5rem 1rem; border-bottom: 2px solid transparent; color: #6c757d; }
    .trade-tab.active { color: #1a1a2e; border-color: #f0b90b; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-3 px-3 px-sm-4 pb-5 pb-lg-4">
  <div class="row g-3">

    <!-- 차트 영역 -->
    <div class="col-lg-8">
      <div class="card p-3">
        <!-- 종목 헤더 -->
        <div class="d-flex align-items-start gap-2 mb-3 flex-wrap">
          <div class="flex-grow-1">
            <h5 class="mb-0 fw-bold" th:text="${stock.name}"></h5>
            <span class="text-secondary small" th:text="${stock.ticker}"></span>
            <span class="badge ms-1"
                  th:classappend="${stock.market.name() == 'KOSPI'} ? 'bg-primary' : 'bg-success'"
                  th:text="${stock.market}"></span>
            <span class="badge ms-1"
                  th:classappend="${marketOpen} ? 'bg-success' : 'bg-secondary'"
                  th:text="${marketStatus}"></span>
            <span class="ms-2 small" id="detail-countdown" style="color:#6c757d; font-variant-numeric:tabular-nums;"></span>
          </div>
          <div class="text-end">
            <div class="fs-5 fw-bold" id="current-price"
                 th:text="${#numbers.formatInteger(price.price(), 1, 'COMMA') + '원'}"></div>
            <div class="small" id="price-change"
                 th:classappend="${price.change() >= 0} ? 'up' : 'down'"
                 th:text="${(price.change() >= 0 ? '+' : '') + #numbers.formatInteger(price.change(), 1, 'COMMA') + '원 (' + #numbers.formatDecimal(price.changePercent(), 1, 2) + '%)'}"></div>
            <div class="small text-secondary mt-1">
              호가단위 <span th:text="${#numbers.formatInteger(tickSize, 1, 'COMMA') + '원'}"></span>
              <span th:if="${upperLimit != null}" class="ms-2">
                <span class="up" th:text="'상한 ' + ${#numbers.formatInteger(upperLimit, 1, 'COMMA') + '원'}"></span>
                <span class="mx-1">·</span>
                <span class="down" th:text="'하한 ' + ${#numbers.formatInteger(lowerLimit, 1, 'COMMA') + '원'}"></span>
              </span>
            </div>
          </div>
        </div>

        <!-- 기간 선택 -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <button class="period-btn" th:classappend="${period == '1d'} ? 'active'" onclick="loadChart('1d', this)">1일</button>
          <button class="period-btn" th:classappend="${period == '5d'} ? 'active'" onclick="loadChart('5d', this)">5일</button>
          <button class="period-btn" th:classappend="${period == '1mo'} ? 'active'" onclick="loadChart('1mo', this)">1개월</button>
          <button class="period-btn" th:classappend="${period == '3mo'} ? 'active'" onclick="loadChart('3mo', this)">3개월</button>
        </div>

        <!-- 차트 -->
        <div style="position:relative;">
          <div id="chart-loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#ffffff;z-index:1;border-radius:4px;">
            <div class="spinner-border text-warning" role="status" style="width:2rem;height:2rem;">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
          <div id="chart"></div>
        </div>
      </div>
    </div>

    <!-- 매수/매도 패널 -->
    <div class="col-lg-4">
      <!-- 알림 메시지 -->
      <div th:if="${successMessage}" class="alert alert-success py-2 small mb-2" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger py-2 small mb-2" th:text="${errorMessage}"></div>

      <!-- 장마감 안내 -->
      <div th:unless="${marketOpen}" class="alert py-2 small mb-2 text-center"
           style="background:#f0f2f7;border:1px solid #dee2e6;color:#6c757d;">
        거래 가능 시간이 아닙니다 · 정규장 09:00~15:30 / 시간외 15:40~18:00
      </div>

      <!-- 모바일: 탭 UI -->
      <div class="card d-lg-none">
        <div class="d-flex border-bottom" style="overflow-x:auto;">
          <div class="trade-tab active" id="tab-buy" onclick="switchTab('buy')">시장가 매수</div>
          <div class="trade-tab" id="tab-sell" onclick="switchTab('sell')"
               th:classappend="${heldQuantity > 0} ? '' : 'd-none'">
            시장가 매도
            <span th:if="${heldQuantity > 0}" class="badge bg-secondary ms-1 small"
                  th:text="${heldQuantity + '주'}"></span>
          </div>
          <div class="trade-tab" id="tab-limit-buy" onclick="switchTab('limit-buy')">지정가 매수</div>
          <div class="trade-tab" id="tab-limit-sell" onclick="switchTab('limit-sell')"
               th:classappend="${heldQuantity > 0} ? '' : 'd-none'">지정가 매도</div>
        </div>

        <!-- 시장가 매수 폼 (모바일) -->
        <div id="panel-buy" class="p-3">
          <form th:action="@{/trade/buy}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1" placeholder="매수 수량" required>
            </div>
            <div class="d-flex justify-content-between text-secondary small mb-3">
              <span>예상 금액</span>
              <span id="buy-amount-m">-</span>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold" th:disabled="${!marketOpen}">매수</button>
          </form>
        </div>

        <!-- 시장가 매도 폼 (모바일) -->
        <div id="panel-sell" class="p-3 d-none" th:if="${heldQuantity > 0}">
          <form th:action="@{/trade/sell}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1"
                     th:max="${heldQuantity}" placeholder="매도 수량" required>
            </div>
            <div class="d-flex justify-content-between text-secondary small mb-3">
              <span>예상 금액</span>
              <span id="sell-amount-m">-</span>
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold" th:disabled="${!marketOpen}">매도</button>
          </form>
        </div>

        <!-- 지정가 매수 폼 (모바일) -->
        <div id="panel-limit-buy" class="p-3 d-none">
          <form th:action="@{/trade/limit/buy}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-2">
              <label class="form-label small text-secondary">지정가 (원)</label>
              <input type="number" name="limitPrice" class="form-control" min="1" placeholder="매수 희망가격" required>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1" placeholder="매수 수량" required>
            </div>
            <p class="small text-secondary mb-2">현재가 이하 도달 시 자동 체결</p>
            <button type="submit" class="btn btn-success w-100 fw-bold">지정가 매수 등록</button>
          </form>
        </div>

        <!-- 지정가 매도 폼 (모바일) -->
        <div id="panel-limit-sell" class="p-3 d-none" th:if="${heldQuantity > 0}">
          <form th:action="@{/trade/limit/sell}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-2">
              <label class="form-label small text-secondary">지정가 (원)</label>
              <input type="number" name="limitPrice" class="form-control" min="1" placeholder="매도 희망가격" required>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1"
                     th:max="${heldQuantity}" placeholder="매도 수량" required>
            </div>
            <p class="small text-secondary mb-2">현재가 이상 도달 시 자동 체결</p>
            <button type="submit" class="btn btn-danger w-100 fw-bold">지정가 매도 등록</button>
          </form>
        </div>
      </div>

      <!-- 데스크톱: 시장가 카드 -->
      <div class="card p-3 mb-3 d-none d-lg-block">
        <div class="d-flex gap-3 mb-3">
          <span class="fw-bold" id="dt-tab-market" onclick="switchDtTab('market')" style="cursor:pointer;color:#f0b90b;border-bottom:2px solid #f0b90b;padding-bottom:4px;">시장가</span>
          <span class="fw-bold" id="dt-tab-limit" onclick="switchDtTab('limit')" style="cursor:pointer;color:#6c757d;padding-bottom:4px;">지정가</span>
        </div>

        <!-- 데스크톱 시장가 -->
        <div id="dt-panel-market">
          <h6 class="text-secondary mb-3">매수</h6>
          <form th:action="@{/trade/buy}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1" placeholder="매수 수량" required>
            </div>
            <div class="d-flex justify-content-between text-secondary small mb-3">
              <span>예상 금액</span>
              <span id="buy-amount">-</span>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold" th:disabled="${!marketOpen}">매수</button>
          </form>
        </div>

        <!-- 데스크톱 지정가 -->
        <div id="dt-panel-limit" class="d-none">
          <h6 class="text-secondary mb-3">지정가 매수</h6>
          <form th:action="@{/trade/limit/buy}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-2">
              <label class="form-label small text-secondary">지정가 (원)</label>
              <input type="number" name="limitPrice" class="form-control" min="1" placeholder="매수 희망가격" required>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주)</label>
              <input type="number" name="quantity" class="form-control" min="1" placeholder="수량" required>
            </div>
            <p class="small text-secondary mb-2">현재가 이하 도달 시 자동 체결</p>
            <button type="submit" class="btn btn-success w-100 fw-bold">지정가 매수 등록</button>
          </form>
          <hr style="border-color:#dee2e6;">
          <h6 class="text-secondary mb-3">지정가 매도</h6>
          <form th:if="${heldQuantity > 0}" th:action="@{/trade/limit/sell}" method="post">
            <input type="hidden" name="ticker" th:value="${stock.ticker}">
            <div class="mb-2">
              <label class="form-label small text-secondary">지정가 (원)</label>
              <input type="number" name="limitPrice" class="form-control" min="1" placeholder="매도 희망가격" required>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">수량 (주, 보유: <span th:text="${heldQuantity}"></span>주)</label>
              <input type="number" name="quantity" class="form-control" min="1" th:max="${heldQuantity}" placeholder="수량" required>
            </div>
            <p class="small text-secondary mb-2">현재가 이상 도달 시 자동 체결</p>
            <button type="submit" class="btn btn-danger w-100 fw-bold">지정가 매도 등록</button>
          </form>
          <p th:unless="${heldQuantity > 0}" class="small text-secondary">보유 종목 없음</p>
        </div>
      </div>

      <div class="card p-3 d-none d-lg-block" th:if="${heldQuantity > 0}">
        <h6 class="text-secondary mb-1">시장가 매도</h6>
        <p class="small text-secondary mb-3">보유수량: <span class="text-dark fw-bold" th:text="${heldQuantity + '주'}"></span></p>
        <form th:action="@{/trade/sell}" method="post">
          <input type="hidden" name="ticker" th:value="${stock.ticker}">
          <div class="mb-3">
            <label class="form-label small text-secondary">수량 (주)</label>
            <input type="number" name="quantity" class="form-control" min="1"
                   th:max="${heldQuantity}" placeholder="매도 수량" required>
          </div>
          <div class="d-flex justify-content-between text-secondary small mb-3">
            <span>예상 금액</span>
            <span id="sell-amount">-</span>
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-bold" th:disabled="${!marketOpen}">매도</button>
        </form>
      </div>

      <div class="mt-2 text-end">
        <a href="/trade/orders" class="small text-secondary">지정가 주문 내역 →</a>
      </div>
    </div>

  </div>
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const ticker = /*[[${stock.ticker}]]*/ '';
  let currentPrice = /*[[${price.price()}]]*/ 0;
  let currentPeriod = /*[[${period}]]*/ '1mo';

  // ── 카운트다운 ────────────────────────────────────
  (function() {
    const targetMs   = /*[[${nextEventMs}]]*/ 0;
    const isNextOpen = /*[[${nextEventOpen}]]*/ true;
    const el         = document.getElementById('detail-countdown');

    function fmt(diff) {
      if (diff <= 0) return null;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const hms = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return d > 0 ? `${d}일 ${hms}` : hms;
    }

    function tick() {
      const diff = targetMs - Date.now();
      if (diff <= 0) { location.reload(); return; }
      const label = isNextOpen ? '장 시작까지 ' : '장마감까지 ';
      el.textContent = label + fmt(diff);
    }
    tick();
    setInterval(tick, 1000);
  })();

  const chartEl = document.getElementById('chart');
  const chart = LightweightCharts.createChart(chartEl, {
    layout: { background: { color: '#ffffff' }, textColor: '#495057' },
    grid: { vertLines: { color: '#e2e5eb' }, horzLines: { color: '#e2e5eb' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#dee2e6' },
    timeScale: { borderColor: '#dee2e6', timeVisible: true },
    width: chartEl.offsetWidth,
    height: chartEl.offsetHeight,
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
  });

  const chartLoadingEl = document.getElementById('chart-loading');

  function loadChart(period, btn) {
    currentPeriod = period;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    chartLoadingEl.style.display = 'flex';
    fetch(`/api/stocks/history/${encodeURIComponent(ticker)}?period=${period}`)
      .then(r => r.json())
      .then(data => {
        chartLoadingEl.style.display = 'none';
        candleSeries.setData(data.map(c => ({
          time: c.time, open: c.open, high: c.high, low: c.low, close: c.close
        })));
        chart.timeScale().fitContent();
      })
      .catch(() => { chartLoadingEl.style.display = 'none'; });
  }
  loadChart(currentPeriod);

  function refreshPrice() {
    fetch(`/api/stocks/price/${encodeURIComponent(ticker)}`)
      .then(r => r.json())
      .then(d => {
        currentPrice = d.price;
        document.getElementById('current-price').textContent =
          Number(d.price).toLocaleString('ko-KR') + '원';
        const el = document.getElementById('price-change');
        el.textContent = (d.change >= 0 ? '+' : '') +
          Number(d.change).toLocaleString('ko-KR') + '원 (' +
          Number(d.changePercent).toFixed(2) + '%)';
        el.className = 'small ' + (d.change >= 0 ? 'up' : 'down');
        updateAmounts();
      });
  }
  setInterval(refreshPrice, 10000);

  function updateAmounts() {
    // 데스크톱
    const buyQty = document.querySelector('#panel-buy input[name=quantity], .d-lg-block input[name=quantity]')?.value;
    ['buy-amount', 'buy-amount-m'].forEach(id => {
      const el = document.getElementById(id);
      if (el && buyQty) el.textContent = (Number(buyQty) * currentPrice).toLocaleString('ko-KR') + '원';
    });
    const sellQtyEl = document.querySelector('#panel-sell input[name=quantity]') ||
                      document.querySelectorAll('.d-lg-block input[name=quantity]')[1];
    if (sellQtyEl?.value) {
      ['sell-amount', 'sell-amount-m'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = (Number(sellQtyEl.value) * currentPrice).toLocaleString('ko-KR') + '원';
      });
    }
  }
  document.querySelectorAll('input[name=quantity]').forEach(el => el.addEventListener('input', updateAmounts));

  // 모바일 탭 전환
  const mobileTabs = ['buy', 'sell', 'limit-buy', 'limit-sell'];
  function switchTab(tab) {
    mobileTabs.forEach(t => {
      const panel = document.getElementById('panel-' + t);
      const tabEl = document.getElementById('tab-' + t);
      if (panel) panel.classList.toggle('d-none', t !== tab);
      if (tabEl) tabEl.classList.toggle('active', t === tab);
    });
  }

  // 데스크톱 시장가/지정가 탭 전환
  function switchDtTab(tab) {
    const isMarket = tab === 'market';
    document.getElementById('dt-panel-market').classList.toggle('d-none', !isMarket);
    document.getElementById('dt-panel-limit').classList.toggle('d-none', isMarket);
    const mEl = document.getElementById('dt-tab-market');
    const lEl = document.getElementById('dt-tab-limit');
    mEl.style.color = isMarket ? '#f0b90b' : '#6c757d';
    mEl.style.borderBottom = isMarket ? '2px solid #f0b90b' : 'none';
    lEl.style.color = isMarket ? '#6c757d' : '#f0b90b';
    lEl.style.borderBottom = isMarket ? 'none' : '2px solid #f0b90b';
  }

  window.addEventListener('resize', () => {
    chart.applyOptions({ width: chartEl.offsetWidth, height: chartEl.offsetHeight });
  });
</script>
</body>
</html>
