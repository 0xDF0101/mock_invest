<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대시보드 - MockInvest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3e; }
    .table { color: #e0e0e0; }
    .table-hover tbody tr:hover { background-color: #232640; color: #e0e0e0; }
    .text-secondary { color: #9da5ae !important; }
    .up { color: #26a69a; } .down { color: #ef5350; }
    .stat-label { font-size: .75rem; color: #aaa; letter-spacing: .05em; }
    .stat-value { font-size: 1.3rem; font-weight: 700; }
    @media (max-width: 576px) { .stat-value { font-size: 1.1rem; } }
    a { color: #f0b90b; text-decoration: none; }
    a:hover { color: #ffd234; }
    .index-pill {
      display: flex; align-items: center; gap: .6rem;
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 8px; padding: .4rem .9rem;
      white-space: nowrap;
    }
    .holding-card {
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 8px; padding: .75rem;
      cursor: pointer; transition: border-color .15s;
    }
    .holding-card:hover { border-color: #f0b90b; }
    .spark-canvas { width: 100%; height: 70px; display: block; }
    thead th { color: #bbb; font-weight: 500; }
    @keyframes shimmer {
      0% { background-position: -400% 0; }
      100% { background-position: 400% 0; }
    }
    .spark-shimmer {
      background: linear-gradient(90deg, #1e2235 25%, #2d3050 50%, #1e2235 75%);
      background-size: 400% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-3 px-3 px-sm-4 pb-5 pb-lg-4">

  <!-- 지수 바 -->
  <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
    <div class="index-pill">
      <span class="small" style="color:#aaa;">KOSPI</span>
      <span class="fw-bold" id="kospi-price"
            th:text="${#numbers.formatDecimal(kospi.price(), 1, 2)}"></span>
      <span id="kospi-change" class="small"
            th:classappend="${kospi.change() >= 0} ? 'up' : 'down'"
            th:text="${kospi.change() >= 0 ? '+' : ''} + ${#numbers.formatDecimal(kospi.changePercent(), 1, 2)} + '%'"></span>
    </div>
    <div class="index-pill">
      <span class="small" style="color:#aaa;">KOSDAQ</span>
      <span class="fw-bold" id="kosdaq-price"
            th:text="${#numbers.formatDecimal(kosdaq.price(), 1, 2)}"></span>
      <span id="kosdaq-change" class="small"
            th:classappend="${kosdaq.change() >= 0} ? 'up' : 'down'"
            th:text="${kosdaq.change() >= 0 ? '+' : ''} + ${#numbers.formatDecimal(kosdaq.changePercent(), 1, 2)} + '%'"></span>
    </div>
    <div class="index-pill">
      <span class="small" style="color:#aaa;">시장</span>
      <span class="badge"
            th:classappend="${marketOpen} ? 'bg-success' : 'bg-secondary'"
            th:text="${marketStatus}"></span>
    </div>
    <div class="index-pill"
         id="countdown-pill"
         th:data-target-ms="${nextEventMs}"
         th:data-next-open="${nextEventOpen}">
      <span class="small" id="countdown-label" style="color:#aaa;">--</span>
      <span class="fw-bold" id="countdown-timer" style="font-variant-numeric:tabular-nums;">--:--:--</span>
    </div>
    <a th:href="@{/stocks/search}" class="btn btn-warning btn-sm text-dark fw-bold ms-auto">+ 종목 검색</a>
  </div>

  <!-- 자산 요약 -->
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">
      <div class="card p-3">
        <div class="stat-label">총 자산</div>
        <div class="stat-value text-white"
             th:text="${#numbers.formatInteger(portfolio.totalAsset(), 1, 'COMMA') + '원'}"></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3">
        <div class="stat-label">보유 현금</div>
        <div class="stat-value" style="color:#58c4dc;"
             th:text="${#numbers.formatInteger(portfolio.cashBalance(), 1, 'COMMA') + '원'}"></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3">
        <div class="stat-label">주식 평가금액</div>
        <div class="stat-value text-warning"
             th:text="${#numbers.formatInteger(portfolio.evalAmount(), 1, 'COMMA') + '원'}"></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3">
        <div class="stat-label">총 수익률</div>
        <div class="stat-value"
             th:classappend="${portfolio.returnRate() >= 0} ? 'up' : 'down'"
             th:text="${(portfolio.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(portfolio.returnRate(), 1, 2) + '%'}"></div>
      </div>
    </div>
  </div>

  <!-- 수익률 시계열 차트 -->
  <div th:if="${#lists.size(snapshotDates) >= 2}" class="card p-3 mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="small" style="color:#aaa;">수익률 추이</span>
      <span class="small text-secondary" th:text="${#lists.size(snapshotDates)} + '일'"></span>
    </div>
    <canvas id="return-chart" style="width:100%;height:120px;"></canvas>
  </div>
  <div th:unless="${#lists.size(snapshotDates) >= 2}" class="card p-3 mb-3 text-center" style="color:#aaa;">
    <div class="small mb-1">수익률 추이</div>
    <div style="font-size:.82rem;">매일 장 마감 후 기록됩니다. 내일부터 차트를 확인할 수 있어요.</div>
  </div>

  <!-- 보유 종목 없음 -->
  <div th:if="${portfolio.holdings().isEmpty()}" class="card p-5 text-center">
    <p style="color:#aaa;">보유 중인 종목이 없습니다.</p>
    <a th:href="@{/stocks/search}" class="btn btn-outline-warning btn-sm mx-auto" style="width:fit-content;">종목 검색하러 가기</a>
  </div>

  <!-- 보유 종목 카드 그리드 (스파크라인 포함) -->
  <div th:if="${!portfolio.holdings().isEmpty()}">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0" style="color:#ccc;">보유 종목</h6>
      <a th:href="@{/trade/history}" class="small" style="color:#aaa;">거래내역 →</a>
    </div>

    <div class="row g-2 mb-3">
      <div th:each="h, stat : ${portfolio.holdings()}" class="col-6 col-md-4 col-xl-3">
        <div class="holding-card h-100"
             th:onclick="|location.href='@{/stocks/{t}(t=${h.ticker()})}'|">
          <!-- 헤더 -->
          <div class="d-flex justify-content-between align-items-start mb-1">
            <div style="min-width:0;">
              <div class="fw-bold text-truncate" style="font-size:.85rem;" th:text="${h.name()}"></div>
              <div style="font-size:.7rem; color:#aaa;" th:text="${h.ticker()}"></div>
            </div>
            <span class="badge ms-1 flex-shrink-0"
                  style="font-size:.6rem;"
                  th:classappend="${h.market() == 'KOSPI'} ? 'bg-primary' : 'bg-success'"
                  th:text="${h.market()}"></span>
          </div>
          <!-- 스파크라인 -->
          <canvas th:id="'spark-' + ${stat.index}"
                  th:data-ticker="${h.ticker()}"
                  th:data-up="${h.changePercent() >= 0}"
                  class="spark-canvas rounded"></canvas>
          <!-- 가격 정보 -->
          <div class="mt-1">
            <div class="d-flex justify-content-between align-items-baseline">
              <span class="fw-bold" style="font-size:.9rem;"
                    th:text="${#numbers.formatInteger(h.currentPrice(), 1, 'COMMA') + '원'}"></span>
              <span class="small"
                    th:classappend="${h.changePercent() >= 0} ? 'up' : 'down'"
                    th:text="${(h.changePercent() >= 0 ? '+' : '') + #numbers.formatDecimal(h.changePercent(), 1, 2) + '%'}"></span>
            </div>
            <div class="d-flex justify-content-between mt-1" style="font-size:.75rem; color:#aaa;">
              <span th:text="${h.quantity() + '주 · ' + #numbers.formatInteger(h.avgBuyPrice(), 1, 'COMMA') + '원'}"></span>
              <span class="fw-bold"
                    th:classappend="${h.returnRate() >= 0} ? 'up' : 'down'"
                    th:text="${(h.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(h.returnRate(), 1, 2) + '%'}"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 데스크톱 상세 테이블 -->
    <div class="card d-none d-lg-block" style="overflow-x:auto;">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="ps-3">종목명</th>
            <th>시장</th>
            <th class="text-end">현재가</th>
            <th class="text-end">등락률</th>
            <th class="text-end">보유수량</th>
            <th class="text-end">평균단가</th>
            <th class="text-end">평가금액</th>
            <th class="text-end">수익률</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="h : ${portfolio.holdings()}">
            <td class="ps-3">
              <a th:href="@{/stocks/{ticker}(ticker=${h.ticker()})}" th:text="${h.name()}"></a>
              <div style="font-size:.72rem; color:#aaa;" th:text="${h.ticker()}"></div>
            </td>
            <td><span class="badge bg-secondary" th:text="${h.market()}"></span></td>
            <td class="text-end fw-bold"
                th:text="${#numbers.formatInteger(h.currentPrice(), 1, 'COMMA') + '원'}"></td>
            <td class="text-end"
                th:classappend="${h.changePercent() >= 0} ? 'up' : 'down'"
                th:text="${(h.changePercent() >= 0 ? '+' : '') + #numbers.formatDecimal(h.changePercent(), 1, 2) + '%'}"></td>
            <td class="text-end" th:text="${h.quantity() + '주'}"></td>
            <td class="text-end" style="color:#aaa;"
                th:text="${#numbers.formatInteger(h.avgBuyPrice(), 1, 'COMMA') + '원'}"></td>
            <td class="text-end"
                th:text="${#numbers.formatInteger(h.evalAmount(), 1, 'COMMA') + '원'}"></td>
            <td class="text-end fw-bold"
                th:classappend="${h.returnRate() >= 0} ? 'up' : 'down'"
                th:text="${(h.returnRate() >= 0 ? '+' : '') + #numbers.formatDecimal(h.returnRate(), 1, 2) + '%'}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="~{fragments/navbar :: bottomnav}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── 카운트다운 ────────────────────────────────────
  (function() {
    const pill       = document.getElementById('countdown-pill');
    const targetMs   = parseInt(pill.dataset.targetMs, 10);
    const isNextOpen = pill.dataset.nextOpen === 'true';
    const labelEl    = document.getElementById('countdown-label');
    const timerEl    = document.getElementById('countdown-timer');
    labelEl.textContent = isNextOpen ? '장 시작까지' : '장마감까지';

    function fmt(diff) {
      if (diff <= 0) return '00:00:00';
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const hms = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return d > 0 ? `${d}일 ${hms}` : hms;
    }

    function tick() {
      const diff = targetMs - Date.now();
      if (diff <= 0) { location.reload(); return; }
      timerEl.textContent = fmt(diff);
    }
    tick();
    setInterval(tick, 1000);
  })();

  // ── 지수 폴링 ──────────────────────────────────────
  function updateIndex(ticker, priceId, changeId) {
    fetch(`/api/stocks/price/${encodeURIComponent(ticker)}`)
      .then(r => r.json())
      .then(d => {
        document.getElementById(priceId).textContent =
          Number(d.price).toLocaleString('ko-KR', {minimumFractionDigits: 2});
        const el = document.getElementById(changeId);
        el.textContent = (d.changePercent >= 0 ? '+' : '') + Number(d.changePercent).toFixed(2) + '%';
        el.className = 'small ' + (d.changePercent >= 0 ? 'up' : 'down');
      }).catch(() => {});
  }
  setInterval(() => {
    updateIndex('^KS11', 'kospi-price', 'kospi-change');
    updateIndex('^KQ11', 'kosdaq-price', 'kosdaq-change');
  }, 10000);

  // ── 스파크라인 ────────────────────────────────────
  function drawSparkline(canvas, prices, isUp) {
    if (!canvas || !prices || prices.length < 2) return;
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.offsetWidth || 160;
    const h = canvas.offsetHeight || 70;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const valid = prices.filter(p => p > 0);
    if (valid.length < 2) return;
    const min = Math.min(...valid), max = Math.max(...valid);
    const range = max - min || 1;
    const pad = 3;
    const color = isUp ? '#26a69a' : '#ef5350';

    const xOf = i => (i / (valid.length - 1)) * w;
    const yOf = p => h - pad - ((p - min) / range) * (h - pad * 2);

    // 그라데이션 채우기
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, isUp ? 'rgba(38,166,154,.3)' : 'rgba(239,83,80,.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    valid.forEach((p, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(p)) : ctx.lineTo(xOf(i), yOf(p)));
    ctx.lineTo(xOf(valid.length - 1), h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // 라인
    ctx.beginPath();
    valid.forEach((p, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(p)) : ctx.lineTo(xOf(i), yOf(p)));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // ── 수익률 시계열 차트 ─────────────────────────────
  (function() {
    const canvas = document.getElementById('return-chart');
    if (!canvas) return;
    const dates  = /*[[${snapshotDates}]]*/ [];
    const assets = /*[[${snapshotAssets}]]*/ [];
    if (assets.length < 2) return;

    const INITIAL = 10000000;
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = canvas.offsetWidth  * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    const pad = { t: 8, r: 8, b: 24, l: 60 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

    const min = Math.min(...assets, INITIAL) * 0.995;
    const max = Math.max(...assets, INITIAL) * 1.005;
    const xOf = i => pad.l + (i / (assets.length - 1)) * cw;
    const yOf = v => pad.t + ch - ((v - min) / (max - min)) * ch;

    // 기준선 (초기자본)
    const baseY = yOf(INITIAL);
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = '#3a3d50';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.l, baseY); ctx.lineTo(pad.l + cw, baseY); ctx.stroke();
    ctx.setLineDash([]);

    // 그라데이션 채우기
    const lastAbove = assets[assets.length - 1] >= INITIAL;
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
    grad.addColorStop(0, lastAbove ? 'rgba(38,166,154,.35)' : 'rgba(239,83,80,.35)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    assets.forEach((v, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(v)) : ctx.lineTo(xOf(i), yOf(v)));
    ctx.lineTo(xOf(assets.length - 1), pad.t + ch);
    ctx.lineTo(xOf(0), pad.t + ch);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // 선
    ctx.beginPath();
    assets.forEach((v, i) => i === 0 ? ctx.moveTo(xOf(i), yOf(v)) : ctx.lineTo(xOf(i), yOf(v)));
    ctx.strokeStyle = lastAbove ? '#26a69a' : '#ef5350';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Y축 레이블 (초기자본 기준선)
    ctx.fillStyle = '#666';
    ctx.font = `${10 * dpr / dpr}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('1,000만', pad.l - 4, baseY + 4);

    // X축 첫/마지막 날짜
    ctx.textAlign = 'left';
    ctx.fillText(dates[0]?.slice(5) ?? '', pad.l, H - 4);
    ctx.textAlign = 'right';
    ctx.fillText(dates[dates.length - 1]?.slice(5) ?? '', pad.l + cw, H - 4);
  })();

  document.querySelectorAll('.spark-canvas').forEach(canvas => {
    canvas.classList.add('spark-shimmer');
    const ticker = canvas.dataset.ticker;
    const isUp = canvas.dataset.up === 'true';
    fetch(`/api/stocks/history/${encodeURIComponent(ticker)}?period=1mo`)
      .then(r => r.json())
      .then(data => {
        canvas.classList.remove('spark-shimmer');
        drawSparkline(canvas, data.map(d => d.close), isUp);
      })
      .catch(() => canvas.classList.remove('spark-shimmer'));
  });
</script>
</body>
</html>
