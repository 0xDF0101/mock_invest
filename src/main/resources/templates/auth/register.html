<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 - MockInvest</title>
  <script th:replace="~{fragments/navbar :: theme-init}"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { background: var(--bg-body); color: var(--c-text); }
    .card { background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .form-control { background: var(--bg-input); border-color: var(--border); color: var(--c-text); }
    .form-control:focus { background: var(--bg-input); color: var(--c-text); border-color: #f0b90b; box-shadow: 0 0 0 0.2rem rgba(240,185,11,.15); }
    .is-invalid { border-color: #dc3545 !important; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3 py-4">
<div class="card p-4 shadow w-100" style="max-width: 440px;">
  <div class="text-center mb-4">
    <h2 class="text-warning fw-bold">📈 MockInvest</h2>
    <p class="text-secondary small">1,000만원으로 모의 투자를 시작하세요</p>
  </div>

  <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger py-2 small">
      <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small">아이디</label>
      <input type="text" th:field="*{username}"
             th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
             class="form-control" placeholder="3~20자" required>
      <div class="invalid-feedback small" th:if="${#fields.hasErrors('username')}"
           th:errors="*{username}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small">이메일</label>
      <input type="email" th:field="*{email}"
             th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
             class="form-control" placeholder="이메일 주소" required>
      <div class="invalid-feedback small" th:if="${#fields.hasErrors('email')}"
           th:errors="*{email}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small">비밀번호</label>
      <input type="password" th:field="*{password}"
             th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
             class="form-control" placeholder="8자 이상" required>
      <div class="invalid-feedback small" th:if="${#fields.hasErrors('password')}"
           th:errors="*{password}"></div>
    </div>
    <div class="mb-4">
      <label class="form-label text-secondary small">비밀번호 확인</label>
      <input type="password" th:field="*{passwordConfirm}"
             th:classappend="${#fields.hasErrors('passwordConfirm')} ? 'is-invalid' : ''"
             class="form-control" placeholder="비밀번호 재입력" required>
      <div class="invalid-feedback small" th:if="${#fields.hasErrors('passwordConfirm')}"
           th:errors="*{passwordConfirm}"></div>
    </div>
    <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">가입하기</button>
  </form>

  <hr class="my-3">
  <p class="text-center text-secondary small mb-0">
    이미 계정이 있으신가요?
    <a th:href="@{/auth/login}" class="text-warning text-decoration-none">로그인</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
