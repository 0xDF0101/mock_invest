<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인 - MockInvest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3e; }
    .form-control { background: #0f1117; border-color: #2a2d3e; color: #e0e0e0; }
    .form-control:focus { background: #0f1117; color: #e0e0e0; border-color: #f0b90b; box-shadow: 0 0 0 0.2rem rgba(240,185,11,.15); }
    #top-progress { position:fixed;top:0;left:0;width:0;height:3px;background:#f0b90b;z-index:10000;transition:width .3s ease,opacity .4s ease;opacity:0;pointer-events:none;border-radius:0 2px 2px 0; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3">
<div id="top-progress"></div>
<div class="card p-4 shadow w-100" style="max-width: 400px;">
  <div class="text-center mb-4">
    <h2 class="text-warning fw-bold">📈 MockInvest</h2>
    <p class="text-secondary small">모의 주식 투자 플랫폼</p>
  </div>

  <div th:if="${param.error}" class="alert alert-danger py-2 small">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  <div th:if="${param.disabled}" class="alert alert-warning py-2 small">
    이메일 인증이 완료되지 않았습니다.
    <a th:href="@{/auth/resend-verification}" class="alert-link">인증 이메일 재발송</a>
  </div>
  <div th:if="${param.logout}" class="alert alert-info py-2 small">로그아웃 되었습니다.</div>
  <div th:if="${successMessage}" class="alert alert-success py-2 small" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger py-2 small" th:text="${errorMessage}"></div>

  <form th:action="@{/auth/login}" method="post">
    <div class="mb-3">
      <label class="form-label text-secondary small">아이디</label>
      <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
    </div>
    <div class="mb-3">
      <label class="form-label text-secondary small">비밀번호</label>
      <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
    </div>
    <button type="submit" id="login-btn" class="btn btn-warning w-100 fw-bold text-dark">로그인</button>
  </form>

  <hr class="border-secondary my-3">
  <p class="text-center text-secondary small mb-1">
    계정이 없으신가요?
    <a th:href="@{/auth/register}" class="text-warning text-decoration-none">회원가입</a>
  </p>
  <p class="text-center text-secondary small mb-0">
    비밀번호를 잊으셨나요?
    <a th:href="@{/auth/forgot-password}" class="text-warning text-decoration-none">비밀번호 찾기</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function() {
    var bar = document.getElementById('top-progress');
    var timer, w = 0;
    function start() {
      clearInterval(timer);
      w = 5; bar.style.opacity = '1'; bar.style.width = w + '%';
      timer = setInterval(function() {
        w += w < 70 ? Math.random() * 8 : w < 90 ? 1.5 : 0.3;
        if (w > 92) w = 92;
        bar.style.width = w + '%';
      }, 300);
    }

    var form = document.querySelector('form');
    var btn = document.getElementById('login-btn');
    form.addEventListener('submit', function() {
      start();
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>로그인 중...';
    });
  })();
</script>
</body>
</html>
