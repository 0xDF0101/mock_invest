<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>인증 이메일 재발송 - MockInvest</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .card { background: #1a1d2e; border: 1px solid #2a2d3e; }
    .form-control { background: #0f1117; border-color: #2a2d3e; color: #e0e0e0; }
    .form-control:focus { background: #0f1117; color: #e0e0e0; border-color: #f0b90b; box-shadow: 0 0 0 0.2rem rgba(240,185,11,.15); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3">
<div class="card p-4 shadow w-100" style="max-width: 400px;">
  <div class="text-center mb-4">
    <h2 class="text-warning fw-bold">📈 MockInvest</h2>
    <p class="text-secondary small">인증 이메일을 다시 받으세요</p>
  </div>

  <form th:action="@{/auth/resend-verification}" method="post">
    <div class="mb-3">
      <label class="form-label text-secondary small">이메일</label>
      <input type="email" name="email" class="form-control" placeholder="가입 시 사용한 이메일" required autofocus>
    </div>
    <button type="submit" class="btn btn-warning w-100 fw-bold text-dark">인증 이메일 재발송</button>
  </form>

  <hr class="border-secondary my-3">
  <p class="text-center text-secondary small mb-0">
    <a th:href="@{/auth/login}" class="text-warning text-decoration-none">로그인으로 돌아가기</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
