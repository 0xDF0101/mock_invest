<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
  <!-- 페이지 로딩 진행 바 -->
  <div id="top-progress" style="position:fixed;top:0;left:0;width:0;height:3px;background:#f0b90b;z-index:10000;transition:width .3s ease,opacity .4s ease;opacity:0;pointer-events:none;border-radius:0 2px 2px 0;"></div>
  <script>
  (function() {
    var bar = document.getElementById('top-progress');
    var timer, w = 0;
    function start() {
      clearInterval(timer);
      w = 5; bar.style.opacity = '1'; bar.style.width = w + '%';
      timer = setInterval(function() {
        w += w < 70 ? Math.random() * 8 : w < 90 ? 1.5 : 0.3;
        if (w > 92) w = 92;
        bar.style.width = w + '%';
      }, 300);
    }
    function done() {
      clearInterval(timer);
      bar.style.width = '100%';
      setTimeout(function() {
        bar.style.opacity = '0';
        setTimeout(function() { bar.style.width = '0'; }, 400);
      }, 150);
    }
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a[href]').forEach(function(a) {
        if (a.href && a.href.indexOf('javascript') === -1 && !a.target) {
          a.addEventListener('click', function(e) {
            if (!e.ctrlKey && !e.metaKey && !e.shiftKey) start();
          });
        }
      });
      document.querySelectorAll('form').forEach(function(f) {
        f.addEventListener('submit', function() { start(); });
      });
      done();
    });
  })();
  </script>
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
      <span class="text-warning">📈</span> MockInvest
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/dashboard}">대시보드</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/stocks/search}">종목검색</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/trade/history}">거래내역</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item me-3" sec:authorize="isAuthenticated()">
          <span class="text-light small">
            <span class="text-secondary">안녕하세요,</span>
            <span class="text-warning fw-bold" sec:authentication="name"></span>님
          </span>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/auth/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">로그아웃</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- 모바일 하단 네비게이션 (lg 이상에서는 숨김) -->
<nav th:fragment="bottomnav" class="d-lg-none fixed-bottom bg-dark border-top border-secondary"
     sec:authorize="isAuthenticated()" style="border-color:#2a2d3e!important;">
  <div class="d-flex justify-content-around py-2">
    <a th:href="@{/dashboard}" class="text-decoration-none text-center" style="color:#888; min-width:64px;">
      <div style="font-size:1.3rem;">📊</div>
      <div style="font-size:.65rem;">대시보드</div>
    </a>
    <a th:href="@{/stocks/search}" class="text-decoration-none text-center" style="color:#888; min-width:64px;">
      <div style="font-size:1.3rem;">🔍</div>
      <div style="font-size:.65rem;">종목검색</div>
    </a>
    <a th:href="@{/trade/history}" class="text-decoration-none text-center" style="color:#888; min-width:64px;">
      <div style="font-size:1.3rem;">📋</div>
      <div style="font-size:.65rem;">거래내역</div>
    </a>
    <form th:action="@{/auth/logout}" method="post" class="text-center" style="min-width:64px;">
      <button type="submit" class="border-0 bg-transparent text-decoration-none text-center p-0"
              style="color:#888;">
        <div style="font-size:1.3rem;">🚪</div>
        <div style="font-size:.65rem;">로그아웃</div>
      </button>
    </form>
  </div>
</nav>

</html>
